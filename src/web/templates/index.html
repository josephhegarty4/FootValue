<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FootValue Data Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .controls { display: flex; gap: 8px; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
    th { background: #f5f5f5; position: sticky; top: 0; }
    #meta { margin: 8px 0; color: #333; }
    .table-wrap { max-height: 70vh; overflow: auto; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <h2>FootValue • Imported Player Data</h2>
  <div class="controls">
    <select id="source">
      <option value="raw">Raw FBref</option>
      <option value="joined">Processed Joined</option>
    </select>
    <input id="search" placeholder="Search player, club, nation..." />
    <button id="loadBtn">Load</button>
  </div>
  <div id="meta">Loading...</div>
  <div class="table-wrap">
    <table id="table"></table>
  </div>

  <script>
    async function loadData() {
      const source = document.getElementById('source').value;
      const search = document.getElementById('search').value;
      const url = `/api/players?source=${encodeURIComponent(source)}&search=${encodeURIComponent(search)}&limit=500`;
      const response = await fetch(url);
      const data = await response.json();

      document.getElementById('meta').textContent = `Source: ${data.source} | Matched rows: ${data.count} | Showing: ${data.rows.length}`;

      const table = document.getElementById('table');
      table.innerHTML = '';

      if (!data.columns.length) {
        table.innerHTML = '<tr><td>No data found. Run the pipeline first.</td></tr>';
        return;
      }

      const thead = document.createElement('thead');
      const trHead = document.createElement('tr');
      data.columns.forEach(col => {
        const th = document.createElement('th');
        th.textContent = col;
        trHead.appendChild(th);
      });
      thead.appendChild(trHead);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      data.rows.forEach(row => {
        const tr = document.createElement('tr');
        data.columns.forEach(col => {
          const td = document.createElement('td');
          td.textContent = row[col] ?? '';
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
    }

    document.getElementById('loadBtn').addEventListener('click', loadData);
    document.getElementById('search').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') loadData();
    });
    loadData();
  </script>
</body>
</html>
